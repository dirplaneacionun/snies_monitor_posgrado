name: SNIES Posgrado Report

on:
  schedule:
    - cron: '7 13 * * 2'   # 08:07 hora Colombia (UTC-5), martes — minuto "raro" a propósito:
                            # GitHub retrasa/salta con más frecuencia los cron en punto (:00),
                            # por la congestión de miles de workflows disparando a la vez.
  workflow_dispatch:

jobs:
  run-snies-posgrado:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Instalar Chrome
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update -q
          sudo apt-get install -y google-chrome-stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar pipeline posgrado
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          DESTINATARIOS: ${{ secrets.DESTINATARIOS }}
        run: python scripts/run_snies_posgrado.py

      - name: Subir screenshots de debug
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: tmp/*.png
          retention-days: 3

      - name: Commitear datos
        run: |
          git config user.name "snies-bot"
          git config user.email "snies-bot@uninorte.edu.co"
          git add data/ "Programas/"
          git diff --staged --quiet || git commit -m "snies-posgrado: $(date +'%Y-%m-%d')"

      - name: Generar dashboard
        run: python docs/generar_dashboard.py

      - name: Commitear dashboard y publicar
        run: |
          git add docs/
          git diff --staged --quiet || git commit -m "dashboard: $(date +'%Y-%m-%d')"
          git push
